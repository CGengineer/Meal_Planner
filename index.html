<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍱 献立ボード</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;}
html,body{height:100%;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#f1f5f9;height:100svh;min-height:100svh;overflow:hidden;padding-bottom:64px;}
body.no-x-nav{overscroll-behavior-x:none;touch-action:pan-y;}
.header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;gap:8px;flex-wrap:wrap;border-bottom:1px solid #334155;background:#0f172a;position:sticky;top:0;z-index:100;}
.title{font-size:16px;font-weight:bold;white-space:nowrap;}
.actions{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;min-width:0;}
.btn{background:#334155;padding:7px 11px;border-radius:8px;cursor:pointer;border:none;color:#f1f5f9;font-size:12px;white-space:nowrap;transition:background .1s;font-family:inherit;min-height:34px;}
.btn:hover{background:#475569;}.btn:active{transform:scale(.93);background:#1e293b;}
.btn.primary{background:#2563eb;}.btn.primary:hover{background:#3b82f6;}
.more-menu{position:relative;}
.more-panel{display:none;position:absolute;right:0;top:calc(100% + 6px);background:#1e293b;border:1px solid #334155;border-radius:10px;padding:6px;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.45);z-index:220;}
.more-panel.open{display:flex;flex-direction:column;gap:5px;}
.more-item{background:#334155;border:none;color:#f1f5f9;border-radius:8px;padding:7px 9px;font-size:12px;text-align:left;cursor:pointer;font-family:inherit;}
.more-item:hover{background:#475569;}
/* Calendar */
.calendar{display:grid;grid-template-columns:repeat(7,minmax(120px,1fr));height:calc(100svh - 140px);border-top:1px solid #334155;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.day{border-right:1px solid #334155;border-bottom:1px solid #334155;padding:8px 7px;display:flex;flex-direction:column;gap:6px;min-height:clamp(200px,calc(80svh - 140px),600px);overflow:visible;transition:background .12s;}
.day:nth-child(7n){border-right:none;}.day.drag-over-move{background:rgba(202,138,4,0.18)!important;}.day.drag-over-copy{background:rgba(22,163,74,0.18)!important;}
.day-header{font-size:11px;font-weight:bold;text-align:center;padding:2px 30px 2px 30px;border-radius:4px;position:relative;display:flex;align-items:center;justify-content:center;}
.day-assign-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;border-radius:999px;background:#1d4ed8;color:#f8fafc;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.day-assign-btn:hover{background:#2563eb;}
.day-assign-btn.active{background:#0f766e;}
.day-preset-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;border-radius:999px;background:transparent;color:#475569;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.day-preset-btn:hover{color:#fbbf24;}.day-preset-btn.has-presets{color:#f59e0b;}
.preset-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.preset-row{display:flex;align-items:center;gap:6px;background:#0f172a;border-radius:7px;padding:6px 8px;}
.preset-row-name{flex:1;font-size:12px;color:#e2e8f0;min-width:0;word-break:break-all;}
.preset-save-area{display:flex;gap:6px;margin-bottom:4px;}.preset-save-area input{flex:1;}
.meal-dots{display:flex;gap:3px;position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);}
.meal-dot{width:5px;height:5px;border-radius:50%;background:#334155;}
.day-header{padding-bottom:14px;}
.weekday-mode-btn.active{background:#f59e0b!important;color:#0f172a!important;}
.day.assignment-target{background:#10243a;box-shadow:inset 0 0 0 1px #22d3ee;}
.pool-assign-hint{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:8px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:7px 8px;font-size:11px;color:#cbd5e1;}
.pool-assign-hint .btn{padding:4px 8px;font-size:11px;min-height:28px;}
.day.today{background:#1a2332;}.day.sun .day-header{color:#f87171;}.day.sat .day-header{color:#60a5fa;}
/* Card */
.card{background:#1e293b;border-radius:8px;padding:7px 7px 5px;cursor:grab;position:relative;border-left:3px solid #475569;font-size:12px;transition:background .1s,transform .16s ease,opacity .16s ease,background-color .1s;user-select:none;touch-action:pan-y;min-height:88px;}
.card:hover{background:#263348;}
.card.is-draggable .card-text,.pool-card.is-draggable .card-text{cursor:grab;user-select:none;}
.card.is-draggable .card-text:active,.pool-card.is-draggable .card-text:active{cursor:grabbing;}
.card-img-wrap{position:relative;margin-top:6px;border-radius:6px;overflow:hidden;}
.card-img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:6px;display:block;}
.card.has-image,.pool-card.has-image{display:flex;align-items:flex-start;gap:8px;}
.card.has-image .card-main,.pool-card.has-image .card-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.card.has-image .card-img-wrap,.pool-card.has-image .card-img-wrap{margin-top:0;width:72px;min-width:72px;flex-shrink:0;}
.card.has-image .card-img,.pool-card.has-image .card-img{width:72px;height:72px;aspect-ratio:auto;}
body[data-card-density="minimal"] .card.has-image .card-img-wrap,.pool-card.has-image .card-img-wrap{width:64px;min-width:64px;}
body[data-card-density="minimal"] .card.has-image .card-img,.pool-card.has-image .card-img{width:64px;height:64px;}
body[data-card-density="detailed"] .card.has-image .card-img-wrap{width:80px;min-width:80px;}
body[data-card-density="detailed"] .card.has-image .card-img{width:80px;height:80px;}
.card-text{padding-right:20px;word-break:break-all;line-height:1.4;}
.card-meta{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;align-items:center;}
.card-badge{font-size:9px;padding:1px 5px;border-radius:8px;background:#0f172a;white-space:nowrap;}
.card-stars{font-size:10px;color:#f59e0b;letter-spacing:-1px;}
.card-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:10px;margin-top:2px;}
.card-overlay{position:absolute;left:4px;right:4px;bottom:4px;display:flex;flex-wrap:wrap;gap:3px;align-items:center;pointer-events:none;}
.card-overlay .card-meta{margin-top:0;}
.card-overlay .card-badge,.card-overlay .card-tag,.card-overlay .card-stars{background:rgba(15,23,42,.78);backdrop-filter:blur(2px);}
.card-overlay .card-stars{padding:1px 5px;border-radius:8px;line-height:1.2;}
.card-overlay .card-tag{margin-top:0;}
.card-edit-btn{position:absolute;top:4px;right:4px;background:transparent;border:none;color:#64748b;font-size:13px;padding:4px 6px;cursor:pointer;border-radius:4px;opacity:0;transition:opacity .15s;line-height:1;min-height:28px;min-width:28px;display:flex;align-items:center;justify-content:center;}
.card:hover .card-edit-btn{opacity:1;}.card-edit-btn:hover{background:#334155;color:#f1f5f9;}
/* Bottom Sheet */
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-radius:16px 16px 0 0;border-top:1px solid #334155;z-index:150;height:80px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -4px 20px rgba(0,0,0,.45);}
.bs-anim{transition:height .3s cubic-bezier(.32,.72,0,1);}
.bottom-sheet.sheet-peek{height:28px!important;overflow:hidden;}
.sheet-handle{display:flex;justify-content:center;align-items:center;padding:12px 0 7px;flex-shrink:0;touch-action:none;cursor:grab;user-select:none;}
.sheet-handle:active{cursor:grabbing;}
.handle-bar{width:52px;height:6px;background:#475569;border-radius:3px;pointer-events:none;}
.sheet-search{display:flex;align-items:center;padding:0 8px 7px;gap:6px;flex-shrink:0;}
.active-filter-bar{display:none;gap:5px;padding:0 8px 7px;flex-wrap:wrap;flex-shrink:0;}
.active-filter-bar.show{display:flex;}
.filter-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;background:#0f172a;border:1px solid #334155;color:#cbd5e1;padding:2px 7px;border-radius:999px;}
.filter-chip button{background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:11px;line-height:1;padding:0;}
.filter-chip.more{color:#94a3b8;border-style:dashed;}
.search-wrap{flex:1;display:flex;align-items:center;background:#0f172a;border-radius:8px;padding:10px 9px;gap:6px;border:1px solid #334155;min-width:0;}
.search-input{flex:1;background:transparent;border:none;color:#f1f5f9;font-size:16px;font-family:inherit;outline:none;min-width:0;}
.search-input::placeholder{color:#475569;}
.sheet-tag-filter{display:none;gap:5px;padding:0 8px 7px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid #1e3a5f;}
.filter-accordion{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;overflow:hidden;}
.filter-acc-head{width:100%;text-align:left;padding:7px 9px;font-size:11px;color:#cbd5e1;background:#111b2f;border:none;cursor:pointer;font-family:inherit;border-bottom:1px solid #1f2a44;}
.filter-acc-head:last-child{border-bottom:none;}
.filter-acc-head.active{background:#1b2a45;color:#f1f5f9;}
.filter-acc-body{display:none;padding:7px;gap:5px;flex-wrap:wrap;}
.filter-acc-body.open{display:flex;}
.pool-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 8px 8px;overflow-y:auto;align-content:start;-webkit-overflow-scrolling:touch;}
.pool-empty{grid-column:1/-1;text-align:center;color:#475569;font-size:12px;padding:20px 0;}
.pool-card{background:#334155;border-radius:8px;padding:7px 26px 6px 9px;cursor:grab;position:relative;font-size:12px;border-left:3px solid #475569;user-select:none;min-height:88px;}
.pool-card:hover{background:#3d4f65;}.pool-card .card-edit-btn{opacity:0;transition:opacity .15s;}.pool-card:hover .card-edit-btn{opacity:1;}
.card:not(.is-draggable),.pool-card:not(.is-draggable){cursor:default;}
.card,.pool-card,.card-text{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
body.touch-dnd-active,body.touch-dnd-active *{-webkit-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important;}
.touch-drag-ghost{position:fixed;left:0;top:0;pointer-events:none;z-index:820;opacity:.88;filter:drop-shadow(0 14px 24px rgba(2,6,23,.45));transform:translate3d(-9999px,-9999px,0) scale(.8);transform-origin:top left;}
/* Trash */
.trash-bin{position:fixed;bottom:102px;right:12px;width:40px;height:40px;background:#334155;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:200;border:2px solid #475569;transition:background .15s,transform .15s,border-color .15s;}.trash-bin.drag-over{background:#ef4444;border-color:#f87171;transform:scale(1.2);}
.trash-bin.drag-over{background:#ef4444;border-color:#f87171;transform:scale(1.2);}
.meal-select{background:#1e293b;border:1px solid #475569;border-radius:8px;color:#f1f5f9;padding:5px 10px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:bold;}
.meal-select:focus{outline:none;border-color:#3b82f6;}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#1e293b;border-radius:14px;padding:20px;width:min(520px,95vw);max-height:86svh;overflow-y:auto;display:flex;flex-direction:column;gap:12px;border:1px solid #334155;-webkit-overflow-scrolling:touch;}
.modal h2{margin:0;font-size:15px;}
.msec{border-top:1px solid #334155;padding-top:10px;}
.msec-title{font-size:10px;color:#64748b;font-weight:bold;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:11px;color:#94a3b8;}
.form-row{display:flex;gap:8px;}.form-row .form-group{flex:1;}
.form-input{background:#0f172a;border:1px solid #334155;border-radius:7px;color:#f1f5f9;padding:8px 10px;font-size:16px;width:100%;font-family:inherit;min-height:38px;}
.form-input:focus{outline:none;border-color:#3b82f6;}
.edit-tabs{display:flex;gap:5px;flex-wrap:wrap;padding-top:4px;}
.edit-tab-btn{background:#334155;border:1px solid #475569;color:#cbd5e1;border-radius:999px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit;}
.edit-tab-btn.active{background:#2563eb;border-color:#3b82f6;color:#f8fafc;}
.tag-picker{display:flex;gap:5px;flex-wrap:wrap;}
.tag-btn{padding:2px 8px;border-radius:20px;border:2px solid transparent;cursor:pointer;font-size:10px;font-weight:bold;opacity:.7;transition:opacity .1s,border-color .1s;font-family:inherit;}
.tag-btn.selected{opacity:1;border-color:#f1f5f9;}
/* Star rating */
.star-rating{display:flex;gap:1px;}
.star-rating span{font-size:22px;cursor:pointer;color:#334155;transition:color .1s;user-select:none;line-height:1;}
.star-rating span.on{color:#f59e0b;}
/* Ingredient */
.ing-list{display:flex;flex-direction:column;gap:4px;}
.ing-row{display:flex;gap:5px;align-items:center;}.ing-row input{flex:1;}
.ing-stock{display:flex;align-items:center;gap:3px;font-size:11px;color:#94a3b8;white-space:nowrap;}
.ing-stock input{accent-color:#22c55e;cursor:pointer;}
.ing-row button{background:#475569;border:none;color:#f87171;border-radius:5px;padding:3px 7px;cursor:pointer;font-size:13px;}
.modal-actions{display:flex;justify-content:flex-end;gap:7px;}
.edit-actions{position:sticky;bottom:0;background:linear-gradient(to top,#1e293b 70%,rgba(30,41,59,0));padding-top:10px;margin-top:6px;border-top:1px solid #334155;z-index:2;}
.img-preview{width:100%;max-height:150px;object-fit:cover;border-radius:8px;display:block;margin-top:5px;}
.img-clear-btn{background:#475569;border:none;color:#f87171;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;margin-top:4px;}
/* Graph */
.graph-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.graph-box{flex:1;background:#0f172a;border-radius:8px;padding:10px;text-align:center;min-width:90px;}
.graph-bars{display:flex;gap:5px;align-items:flex-end;height:120px;margin-bottom:4px;}
.graph-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.graph-bar{width:100%;background:#3b82f6;border-radius:3px 3px 0 0;min-height:0;transition:height .4s;}
.graph-bar.mid{background:#f59e0b;}.graph-bar.high{background:#ef4444;}
.graph-bar-val{font-size:9px;color:#94a3b8;}.graph-bar-label{font-size:10px;font-weight:bold;}
.macro-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.macro-label{font-size:11px;width:64px;flex-shrink:0;}
.macro-track{flex:1;background:#0f172a;border-radius:4px;height:10px;overflow:hidden;}
.macro-fill{height:100%;border-radius:4px;}
.macro-val{font-size:11px;color:#94a3b8;width:50px;text-align:right;flex-shrink:0;}
/* Shop */
.shop-list{display:flex;flex-direction:column;gap:5px;max-height:55vh;overflow-y:auto;}
.shop-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;background:#0f172a;}
.shop-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#3b82f6;}
.shop-item.checked label{text-decoration:line-through;color:#475569;}
.shop-item label{cursor:pointer;flex:1;font-size:13px;}
.shop-source{font-size:10px;color:#475569;white-space:nowrap;}
/* Settings */
.setting-account{display:flex;align-items:center;gap:10px;padding:10px 0 12px;border-bottom:1px solid #334155;margin-bottom:6px;}
.setting-avatar{width:44px;height:44px;border-radius:999px;object-fit:cover;border:1px solid #475569;background:#0f172a;flex-shrink:0;display:block;}
.setting-avatar-fallback{width:44px;height:44px;border-radius:999px;border:1px solid #475569;background:#0f172a;color:#cbd5e1;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;flex-shrink:0;}
.setting-account-meta{min-width:0;display:flex;flex-direction:column;gap:3px;}
.setting-account-title{font-size:11px;color:#94a3b8;}
.setting-account-email{font-size:13px;color:#f1f5f9;word-break:break-all;line-height:1.35;}
.setting-logout-wrap{padding-top:8px;}
.setting-logout-btn{width:100%;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #1e293b;}
.setting-row:last-child{border-bottom:none;}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:#334155;border-radius:11px;cursor:pointer;transition:.2s;}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#94a3b8;border-radius:50%;transition:.2s;}
.toggle input:checked+.toggle-slider{background:#2563eb;}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#f1f5f9;}
/* Toast */
.toast{position:fixed;bottom:calc(92px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 16px;font-size:12px;z-index:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.mobile-nav{display:grid;position:fixed;left:0;right:0;bottom:0;background:#111b2f;border-top:1px solid #334155;z-index:350;padding:6px 6px calc(6px + env(safe-area-inset-bottom));grid-template-columns:repeat(4,1fr);gap:6px;}
.mobile-nav button{background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:8px 5px;font-size:12px;cursor:pointer;font-family:inherit;min-height:38px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1;}
.sheet-restore-btn{display:none;position:fixed;right:max(12px,env(safe-area-inset-right));bottom:calc(76px + env(safe-area-inset-bottom));z-index:360;background:#1d4ed8;color:#f8fafc;border:none;border-radius:999px;min-width:44px;min-height:44px;padding:0 14px;font-size:16px;cursor:pointer;box-shadow:0 10px 28px rgba(15,23,42,.45);}
.sheet-restore-btn.show{display:inline-flex;align-items:center;justify-content:center;}
body.ui-focus .header .title{opacity:.8;}
body.ui-focus .trash-bin,body.ui-focus .header .actions .meal-select{display:none;}
body.ui-edit #bottomSheet{min-height:100px;}

/* Auth Screen */
body.auth-locked .header,body.auth-locked .calendar,body.auth-locked .bottom-sheet,body.auth-locked .trash-bin,body.auth-locked .mobile-nav{pointer-events:none;filter:blur(1px) brightness(.6);}
body.auth-busy .auth-btn{opacity:.75;cursor:wait;}
.auth-screen{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;padding:20px;background:
radial-gradient(circle at 12% 20%,rgba(56,189,248,.28),transparent 45%),
radial-gradient(circle at 85% 12%,rgba(129,140,248,.24),transparent 42%),
radial-gradient(circle at 50% 88%,rgba(16,185,129,.18),transparent 45%),
linear-gradient(125deg,#020617 0%,#0b1120 40%,#111827 100%);overflow:auto;}
.auth-screen.hidden{display:none;}
.auth-screen::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(148,163,184,.06) 0 1px,transparent 1px 3px);opacity:.18;pointer-events:none;}
.auth-card{position:relative;width:min(460px,96vw);padding:28px 22px 20px;border-radius:24px;background:linear-gradient(160deg,rgba(15,23,42,.9),rgba(15,23,42,.6));border:1px solid rgba(148,163,184,.38);box-shadow:0 24px 70px rgba(2,6,23,.7),inset 0 1px 0 rgba(226,232,240,.24);backdrop-filter:blur(10px);animation:authIn .55s cubic-bezier(.2,.76,.2,1);}
.auth-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(30,41,59,.85);border:1px solid rgba(148,163,184,.35);padding:5px 11px;border-radius:999px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#93c5fd;}
.auth-title{margin:12px 0 5px;font-size:27px;line-height:1.2;font-weight:800;letter-spacing:.03em;}
.auth-subtitle{margin:0 0 16px;color:#cbd5e1;font-size:13px;line-height:1.6;}
.auth-grid{display:grid;gap:10px;}
.auth-input{width:100%;background:#020617;border:1px solid rgba(148,163,184,.4);border-radius:12px;color:#f8fafc;padding:12px 13px;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
.auth-input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.2);}
.auth-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:2px;}
.auth-btn{border:none;border-radius:12px;padding:11px 12px;font-family:inherit;font-weight:700;font-size:13px;color:#e2e8f0;background:#1e293b;cursor:pointer;min-height:44px;transition:transform .12s,background .15s,box-shadow .15s,opacity .15s;}
.auth-btn:hover{background:#334155;}
.auth-btn:active{transform:scale(.98);}
.auth-btn.primary{background:linear-gradient(135deg,#0284c7,#2563eb);box-shadow:0 8px 22px rgba(37,99,235,.35);}
.auth-btn.primary:hover{background:linear-gradient(135deg,#0ea5e9,#2563eb);}
.auth-btn.google{background:#f8fafc;color:#0f172a;}
.auth-btn.google:hover{background:#e2e8f0;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:12px 0 10px;color:#94a3b8;font-size:11px;}
.auth-divider::before,.auth-divider::after{content:"";height:1px;flex:1;background:rgba(148,163,184,.35);}
.auth-message{min-height:20px;margin:12px 0 0;font-size:12px;color:#fca5a5;}
.auth-message.success{color:#86efac;}
.auth-foot{margin-top:14px;display:flex;justify-content:flex-end;}
.auth-foot .auth-btn{font-size:12px;padding:9px 12px;min-height:36px;background:#0f172a;border:1px solid rgba(148,163,184,.35);}
@keyframes authIn{
  from{opacity:0;transform:translateY(12px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.guest-banner{display:none;background:#1e3a5f;border-bottom:1px solid #2563eb;padding:6px 14px;font-size:11px;color:#93c5fd;align-items:center;gap:8px;flex-wrap:wrap;}
.guest-banner.show{display:flex;}.guest-banner button{background:#1d4ed8;border:none;color:#f1f5f9;border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:inherit;}
.guest-banner .dismiss{background:transparent;color:#64748b;font-size:14px;margin-left:auto;}
.meal-section{display:flex;flex-direction:column;gap:4px;padding:3px 0;}
.meal-section-label{font-size:9px;font-weight:bold;color:#64748b;text-transform:uppercase;letter-spacing:.5px;padding:1px 0 2px;border-bottom:1px solid #1e293b;}
.toast-undo-btn{background:#3b82f6;border:none;color:#f1f5f9;border-radius:5px;padding:2px 8px;margin-left:8px;cursor:pointer;font-size:11px;font-family:inherit;vertical-align:middle;}
.edit-delete-btn{color:#f87171!important;}.msec-hint{font-size:10px;color:#64748b;margin:0 0 6px;line-height:1.5;}
.sheet-hint-text{font-size:9px;color:#475569;text-align:center;padding:0 0 3px;letter-spacing:.3px;}
.card-dup-btn{position:absolute;top:4px;right:28px;background:transparent;border:none;color:#64748b;font-size:12px;padding:4px 5px;cursor:pointer;border-radius:4px;opacity:0;transition:opacity .15s;line-height:1;min-height:28px;min-width:24px;display:flex;align-items:center;justify-content:center;}
.pool-card:hover .card-dup-btn{opacity:1;}.card-dup-btn:hover{background:#334155;color:#f1f5f9;}
.cal-progress-bar-wrap{height:3px;background:#1e293b;border-radius:2px;margin-top:3px;overflow:hidden;}
.cal-progress-bar{height:100%;border-radius:2px;transition:width .4s;}
@media(hover:none){.card-edit-btn{opacity:1;background:#33415599;color:#e2e8f0;}.card-dup-btn{opacity:1;background:#33415599;color:#e2e8f0;}}
@media(max-width:760px){
  .calendar{grid-template-columns:1fr;overflow-x:hidden;}
  .day{min-height:calc(100svh - 180px);border-right:none;}

  .card.has-image .card-img-wrap{width:64px;min-width:64px;}

<script>
// ===== CONSTANTS =====
const DAYS=["日","月","火","水","木","金","土"];
const TAGS=["和食","洋食","中華","麺類","丼","主菜","副菜","汁物・スープ","揚げ物","サラダ","デザート","主食","その他"];
const TC={"和食":"#3b82f6","洋食":"#ef4444","中華":"#dc2626","麺類":"#f59e0b","丼":"#8b5cf6","主菜":"#10b981","副菜":"#f97316","汁物・スープ":"#06b6d4","揚げ物":"#d97706","サラダ":"#22c55e","デザート":"#ec4899","主食":"#a78bfa","その他":"#6b7280"};

// ===== STATE =====
let baseDate=new Date();
let allData={};
let pool=[];
let dayPresets=[];
let undoStack=[];
let editTarget=null;
let currentImage="";
let currentImageId="";
let currentMeal="昼";
let imageRegistry={};
let settings={
  showCalories:true,showStars:true,showDifficulty:true,
  showCost:true,showNutritionColor:true,showPlannedCardImage:true,currency:"円",
  cardDensity:"standard",uiMode:"standard",sheetLevel:4,sheetScale:10,sheetHeight:null,sheetHidden:false,
  dailyCalorieGoal:0
};
let weekdayMode=false;
let activeTagFilter=null;
let activeCostFilter=null;
let activeFavoriteFilter=null;
let activeDifficultyFilter=null;
let activeCalorieFilter=null;
let activeInventoryFilter=null;
let activeFilterSection="category";
let editActiveTab="basic";
let expandedDayKeys={};
let assignmentDayIndex=null;
let cloudDb=null;
let cloudStorage=null;
let cloudDocRef=null;
let cloudUnsub=null;
let cloudReady=false;
let cloudApplyingRemote=false;
let cloudLastClientWriteAt=0;
let cloudSaveTimer=null;
let cloudHasInitialSnapshot=false;
let cloudRetryTimer=null;
let cloudRetryCount=0;
let cloudErrorState=null;
let cloudCurrentUser=null;
let cloudLastErrorToastAt=0;
let cloudKnownImageRegistry={};
const cloudImageUploadCache=new Map();
let activeBoardId=null;
let activeBoardName="個人ボード";
let joinedBoards=[];
let touchDragState=null;
let touchDayClickSuppressUntil=0;
const TOUCH_LONG_PRESS_MS=430;
const TOUCH_DRAG_CANCEL_PX=12;

// ===== ITEM FACTORY =====
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function mkItem(text,tag,ings,note){
  return{id:uid(),text,tag:tag||"その他",ingredients:Array.isArray(ings)?[...ings]:[],
    ingredientInventory:{},note:note||"",favorite:0,difficulty:0,calories:0,protein:0,carbs:0,fat:0,cost:0,cookTime:0,fiber:0,sugar:0,salt:0,vitamins:"",steps:"",image:"",imageId:""};
}
function migrateItem(it){
  if(!it) return mkItem("");
  if(typeof it==="string") return mkItem(it);
  const migrated={favorite:0,difficulty:0,calories:0,protein:0,carbs:0,fat:0,cost:0,cookTime:0,fiber:0,sugar:0,salt:0,vitamins:"",steps:"",image:"",imageId:"",ingredientInventory:{},...it};
  if(!migrated.imageId&&migrated.image)migrated.imageId=buildImageIdFromValue(migrated.image);
  return migrated;
}
function isValidImageValue(v){
  return typeof v==="string"&&v.trim().length>0;
}
function isRemoteImageUrl(v){
  return typeof v==="string"&&/^https?:\/\//i.test(v.trim());
}
function fnv1aHash(str){
  let h=0x811c9dc5;
  for(let i=0;i<str.length;i++){
    h^=str.charCodeAt(i);
    h=Math.imul(h,0x01000193);
  }
  return (h>>>0).toString(16).padStart(8,"0");
}
function buildImageIdFromValue(image){
  if(!isValidImageValue(image))return "";
  const raw=String(image);
  const commaIdx=raw.indexOf(",");
  const payload=commaIdx>=0?raw.slice(commaIdx+1):raw;
  return "img_"+fnv1aHash(payload);
}
function findImageIdByImageValue(image){
  if(!isValidImageValue(image))return "";
  for(const key in imageRegistry){
    if(imageRegistry[key]===image)return key;
  }
  return "";
}
function resolveOrCreateImageId(image,preferredId=""){
  const pref=String(preferredId||"").trim();
  if(pref)return pref;
  if(!isValidImageValue(image))return "";
  const existed=findImageIdByImageValue(String(image));
  if(existed)return existed;
  return buildImageIdFromValue(String(image));
}
function ensureItemImageId(item){
  if(!item||typeof item!=="object")return "";
  const existing=typeof item.imageId==="string"?item.imageId.trim():"";
  if(existing)return existing;
  if(isValidImageValue(item.image)){
    const next=resolveOrCreateImageId(item.image,"");
    item.imageId=next;
    return next;
  }
  return "";
}
function rebuildImageRegistry(seed){
  const next={};
  if(seed&&typeof seed==="object"){
    for(const key in seed){
      if(isValidImageValue(seed[key]))next[key]=String(seed[key]);
    }
  }
  const capture=item=>{
    if(!item)return;
    if(!isValidImageValue(item.image))return;
    const imageId=ensureItemImageId(item);
    if(imageId)next[imageId]=String(item.image);
  };
  (pool||[]).forEach(capture);
  for(const wk in allData){
    for(const meal in (allData[wk]||{})){
      const days=Array.isArray(allData[wk][meal])?allData[wk][meal]:[];
      days.forEach(day=>(day||[]).forEach(capture));
    }
  }
  imageRegistry=next;
}
function resolveItemImage(item){
  if(!item)return "";
  const imageId=ensureItemImageId(item);
  if(imageId&&isValidImageValue(imageRegistry[imageId]))return imageRegistry[imageId];
  if(isValidImageValue(item.image)){
    if(imageId)imageRegistry[imageId]=String(item.image);
    return String(item.image);
  }
  return "";
}
function createPlannedItemFromSource(src,newId){
  if(!src)return null;
  const imageUrl=resolveItemImage(src);
  const imageId=ensureItemImageId(src);
  const next={...src,image:""};
  if(newId)next.id=uid();
  next.imageId=imageId||"";
  if(imageId&&isValidImageValue(imageUrl)&&!isValidImageValue(imageRegistry[imageId]))imageRegistry[imageId]=imageUrl;
  return next;
}

function applyDropToDay(obj,col,clientX){
  const di=parseInt(col?.dataset?.dayIndex,10);
  if(!Number.isFinite(di))return false;
  const rect=col.getBoundingClientRect();
  const shouldCopy=clientX>=rect.left+(rect.width/2);

  let changed=false;

  if(obj.fromPool){
    const src=pool[obj.pidx];
    if(src){
      pushUndo();
      item=createPlannedItemFromSource(src,shouldCopy);
      if(!shouldCopy)pool.splice(obj.pidx,1);
      changed=true;
    }
  }else{
    const srcDays=allData[obj.wk]?.[obj.meal];

function clearTouchDrag(){

function startTouchDrag(sourceEl,payload,clientX,clientY){
  clearTouchDrag();
  if(!sourceEl||!payload)return;
  const rect=sourceEl.getBoundingClientRect();
  const ghost=sourceEl.cloneNode(true);
  ghost.classList.add("touch-drag-ghost");
  ghost.querySelectorAll(".card-edit-btn").forEach(btn=>btn.remove());
  ghost.style.width=Math.max(72,Math.round(rect.width))+"px";
  document.body.appendChild(ghost);
  sourceEl.style.opacity=".45";
  document.body.classList.add("touch-dnd-active");
  touchDragState={
    sourceEl,
    payload,
    ghostEl:ghost,
    offsetX:Math.min(rect.width-12,Math.max(12,clientX-rect.left)),
    offsetY:Math.min(rect.height-10,Math.max(10,clientY-rect.top)),
    hoverCol:null
  };
  updateTouchDrag(clientX,clientY);
  if(navigator.vibrate)navigator.vibrate(10);
}
function updateTouchDrag(clientX,clientY){
  if(!touchDragState)return;
  touchDragState.ghostEl.style.transform=`translate3d(${Math.round(clientX-touchDragState.offsetX)}px,${Math.round(clientY-touchDragState.offsetY)}px,0) scale(.8)`;
  touchDragState.hoverCol=updateTouchDropHighlight(clientX,clientY);
}
function endTouchDrag(clientX,clientY){

  updateTouchDrag(clientX,clientY);
  const payload=touchDragState.payload;
  const col=touchDragState.hoverCol;
  touchDayClickSuppressUntil=Date.now()+280;
  clearTouchDrag();
  if(col)return applyDropToDay(payload,col,clientX);
  return false;
}
function bindLongPressTouchDrag(el,getPayload){
  if(!el||!isTouchLikeDevice())return;
  let timer=null;
  let pointerId=null;
  let startX=0,startY=0;
  let longPressed=false;

  const clearTimer=()=>{
    if(timer){
      clearTimeout(timer);
      timer=null;
    }
  };
  const reset=()=>{
    clearTimer();
    pointerId=null;
    longPressed=false;
  };

  el.addEventListener("pointerdown",e=>{
    if(e.pointerType==="mouse")return;
    if(assignmentDayIndex!=null)return;
    if(e.target.closest(".card-edit-btn"))return;
    pointerId=e.pointerId;
    el.setPointerCapture?.(pointerId);
    startX=e.clientX;
    startY=e.clientY;
    longPressed=false;
    clearTimer();
    timer=setTimeout(()=>{
      if(pointerId==null)return;
      const payload=getPayload();
      if(!payload)return;
      longPressed=true;
      startTouchDrag(el,payload,startX,startY);
    },TOUCH_LONG_PRESS_MS);
  },{passive:true});

  el.addEventListener("contextmenu",e=>e.preventDefault());

  el.addEventListener("pointermove",e=>{
    if(pointerId==null||e.pointerId!==pointerId)return;
    const dx=e.clientX-startX;
    const dy=e.clientY-startY;
    if(!longPressed){
      if(Math.abs(dx)>TOUCH_DRAG_CANCEL_PX||Math.abs(dy)>TOUCH_DRAG_CANCEL_PX)clearTimer();
      return;
    }
    e.preventDefault();
    updateTouchDrag(e.clientX,e.clientY);
  },{passive:false});

  const finish=e=>{
    if(pointerId==null||e.pointerId!==pointerId)return;
    el.releasePointerCapture?.(pointerId);
    const wasLongPressed=longPressed;
    clearTimer();
    pointerId=null;
    longPressed=false;
    if(!wasLongPressed)return;
    e.preventDefault();
    endTouchDrag(e.clientX,e.clientY);
  };

  el.addEventListener("pointerup",finish);
  el.addEventListener("pointercancel",finish);
}

// ===== CLOUD SYNC =====
function getCloudDb(){
  if(cloudDb)return cloudDb;
  if(typeof firebase==="undefined"||!firebase.firestore)return null;
  cloudDb=firebase.firestore();
  return cloudDb;
}
function getCloudStorage(){
  if(cloudStorage)return cloudStorage;
  if(typeof firebase==="undefined"||!firebase.storage)return null;
  cloudStorage=firebase.storage();
  return cloudStorage;
}
function dataUrlToBlob(dataUrl){
  const m=String(dataUrl||"").match(/^data:([^;,]+)?(;base64)?,(.*)$/);
  if(!m)return null;
  const mime=m[1]||"application/octet-stream";
  const encoded=m[3]||"";
  let bytes;
  try{
    bytes=atob(encoded);
  }catch(_e){
    return null;
  }
  const arr=new Uint8Array(bytes.length);
  for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function storageExtByMime(mime){
  if(mime==="image/png")return "png";
  if(mime==="image/webp")return "webp";
  if(mime==="image/gif")return "gif";
  return "jpg";
}
async function ensureCloudImageUrl(image,userUid,kind,itemId){
  if(!image||!userUid)return "";
  if(!String(image).startsWith("data:image/"))return image;
  const contentHash=fnv1aHash(String(image));
  const cacheKey=`${userUid}|${contentHash}`;
  if(cloudImageUploadCache.has(cacheKey))return cloudImageUploadCache.get(cacheKey);
  const uploadPromise=(async()=>{
    const st=getCloudStorage();
    if(!st)return image;
    const blob=dataUrlToBlob(image);
    if(!blob)return image;
    const ext=storageExtByMime(blob.type);
    const safeId=itemId||uid();
    const filePath=`users/Images/${safeId}_${contentHash}.${ext}`;
    const ref=st.ref().child(filePath);
    // Reuse existing object when present so we do not create/overwrite duplicates.
    try{
      const existingUrl=await ref.getDownloadURL();
      if(existingUrl)return existingUrl;
    }catch(_e){
      // Not found or no permission to read URL: fall through to upload.
    }
    await ref.put(blob,{contentType:blob.type||"image/jpeg",cacheControl:"public,max-age=31536000"});
    return await ref.getDownloadURL();
  })();
  cloudImageUploadCache.set(cacheKey,uploadPromise);
  try{
    return await uploadPromise;
  }catch(e){
    cloudImageUploadCache.delete(cacheKey);
    throw e;
  }
}
function stopCloudSync(preserveRetryState=false){
  if(cloudSaveTimer){
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer=null;
  }
  if(cloudRetryTimer){
    clearTimeout(cloudRetryTimer);
    cloudRetryTimer=null;
  }
  if(cloudUnsub){
    cloudUnsub();
    cloudUnsub=null;
  }
  cloudDocRef=null;
  cloudReady=false;
  cloudApplyingRemote=false;
  cloudLastClientWriteAt=0;
  cloudHasInitialSnapshot=false;
  if(!preserveRetryState){
    cloudRetryCount=0;
    cloudErrorState=null;
  }
  cloudCurrentUser=null;
}
function cloudErrorCode(err){
  return String(err?.code||"").replace(/^firestore\//,"").toLowerCase();
}
function isRetryableCloudError(err){
  const code=cloudErrorCode(err);
  if(["unavailable","deadline-exceeded","aborted","resource-exhausted","internal","cancelled"].includes(code))return true;
  const msg=String(err?.message||"").toLowerCase();
  return msg.includes("network")||msg.includes("offline")||msg.includes("timeout")||msg.includes("failed to get document");
}
function cloudErrorMessage(err){
  if(typeof err==="string")return err;
  if(err&&typeof err.message==="string"&&err.message.trim())return err.message;
  const code=cloudErrorCode(err);
  if(code)return `cloud error: ${code}`;
  try{
    return JSON.stringify(err);
  }catch(_e){
    return String(err||"クラウド同期に失敗しました");
  }
}
async function sanitizeForCloud(){
  const cloudImageRegistry={...cloudKnownImageRegistry};
  for(const id in imageRegistry){
    const value=imageRegistry[id];
    if(isRemoteImageUrl(value))cloudImageRegistry[id]=value;
  }
  async function ensureImageUrlById(imageId,image,kind,fallbackId){
    const id=String(imageId||"").trim();
    if(!id)return "";
    if(isRemoteImageUrl(cloudImageRegistry[id]))return cloudImageRegistry[id];
    const source=isValidImageValue(image)?String(image):"";
    if(!source)return "";
    const imageUrl=await ensureCloudImageUrl(source,userUid,kind,id||fallbackId);
    if(isValidImageValue(imageUrl))cloudImageRegistry[id]=imageUrl;
    return imageUrl||"";
  }
  async function withUploadedImages(data,userUid){
    const result={};
    for(const wk in data){
      result[wk]={};
      for(const meal in data[wk]){
        const days=Array.isArray(data[wk][meal])?data[wk][meal]:[];
        const flat=[];
        for(let di=0;di<days.length;di++){
          const day=days[di]||[];
          for(let ii=0;ii<day.length;ii++){
            const item=day[ii]||{};
            const {image,...rest}=item;
            const imageId=ensureItemImageId(rest)||ensureItemImageId(item)||"";
            const resolvedImage=isValidImageValue(image)?image:resolveItemImage(item);
            await ensureImageUrlById(imageId,resolvedImage,"planned",rest?.id||`${wk}_${meal}_${di}_${ii}`);
            flat.push({...rest,image:"",imageId,dayIndex:di});
          }
        }
        result[wk][meal]=flat;
      }
    }
    return result;
  }
  const userUid=cloudCurrentUser?.uid||"";
  const safeAllData=await withUploadedImages(allData,userUid);
  const safePool=[];
  for(let i=0;i<(pool||[]).length;i++){
    const item=pool[i]||{};
    const {image,...rest}=item;
    const imageId=ensureItemImageId(rest)||ensureItemImageId(item)||"";
    const resolvedImage=isValidImageValue(image)?image:resolveItemImage(item);
    const imageUrl=await ensureImageUrlById(imageId,resolvedImage,"pool",rest?.id||`pool_${i}`);
    safePool.push({...rest,image:imageUrl||"",imageId});
  }
  const safePresets=[];
  for(let pi=0;pi<(dayPresets||[]).length;pi++){
    const preset=dayPresets[pi]||{};
    const safeItems=[];
    for(let ii=0;ii<(preset.items||[]).length;ii++){
      const item=preset.items[ii]||{};
      const {image,...rest}=item;
      const imageId=ensureItemImageId(rest)||ensureItemImageId(item)||"";
      const resolvedImage=isValidImageValue(image)?image:resolveItemImage(item);
      await ensureImageUrlById(imageId,resolvedImage,"preset",rest?.id||`preset_${pi}_${ii}`);
      safeItems.push({...rest,image:"",imageId});
    }
    safePresets.push({...preset,items:safeItems});
  }
  return JSON.parse(JSON.stringify({allData:safeAllData,pool:safePool,dayPresets:safePresets,settings,imageRegistry:cloudImageRegistry}));
}
function clearCloudErrorState(){
  const hadError=!!cloudErrorState;
  cloudErrorState=null;
  cloudRetryCount=0;
  if(cloudRetryTimer){
    clearTimeout(cloudRetryTimer);
    cloudRetryTimer=null;
  }
  if(hadError)showToast("クラウド同期が復旧しました");
}
function scheduleCloudReconnect(reason){
  if(!cloudCurrentUser||cloudRetryTimer)return;
  const delay=Math.min(30000,Math.max(1000,Math.round(1200*Math.pow(1.8,cloudRetryCount))));
  cloudRetryTimer=setTimeout(async()=>{
    cloudRetryTimer=null;
    if(!cloudCurrentUser)return;
    try{
      await startCloudSync(cloudCurrentUser,true);
      clearCloudErrorState();
    }catch(e){
      handleCloudError(e,reason||"reconnect");
    }
  },delay);
}
function handleCloudError(err,source){
  cloudErrorState={source,code:cloudErrorCode(err)||"unknown",message:String(err?.message||""),at:Date.now()};
  const now=Date.now();
  if(now-cloudLastErrorToastAt>4500){
    showToast(cloudErrorMessage(err));
    cloudLastErrorToastAt=now;
  }
  if(isRetryableCloudError(err)){
    cloudRetryCount=Math.min(cloudRetryCount+1,8);
    scheduleCloudReconnect(source);
  }else{
    cloudRetryCount=0;
  }
}
function applyRemoteState(data){
  const sourceAllData=(data&&data.allData)||{};
  const remoteAllData={};
  const incomingImageRegistry=(data&&typeof data.imageRegistry==="object")?data.imageRegistry:{};
  cloudKnownImageRegistry={...cloudKnownImageRegistry,...incomingImageRegistry};

  const localImageById={};
  for(const wk in allData){
    for(const meal in (allData[wk]||{})){
      const days=Array.isArray(allData[wk][meal])?allData[wk][meal]:[];
      days.forEach(day=>(day||[]).forEach(item=>{
        const imageId=ensureItemImageId(item);
        const resolvedImage=resolveItemImage(item);
        if(imageId&&resolvedImage)localImageById[imageId]=resolvedImage;
      }));
    }
  }

  for(const wk in sourceAllData){
    remoteAllData[wk]={};
    for(const meal in (sourceAllData[wk]||{})){
      const raw=sourceAllData[wk][meal];
      // Legacy shape fallback: Array<Array<Item>>
      if(Array.isArray(raw)&&raw.some(Array.isArray)){
        remoteAllData[wk][meal]=raw.map(day=>(day||[]).map(remoteItem=>{
          const migrated=migrateItem(remoteItem);
          const imageId=ensureItemImageId(migrated);
          const localImg=(imageId&&localImageById[imageId])||"";
          return {...migrated,image:migrated?.image||localImg,imageId:imageId||""};
        }));
        continue;
      }

      // Cloud shape: Array<Item & {dayIndex:number}>
      const days=Array.from({length:7},()=>[]);
      if(Array.isArray(raw)){
        raw.forEach(remoteItem=>{
          const parsedDay=parseInt(remoteItem?.dayIndex,10);
          const di=Number.isFinite(parsedDay)?Math.max(0,Math.min(6,parsedDay)):0;
          const {dayIndex,image,...rest}=remoteItem||{};
          const migrated=migrateItem({...rest,image:image||""});
          const imageId=ensureItemImageId(migrated);
          const knownRemote=(imageId&&incomingImageRegistry[imageId])||"";
          const localImg=(imageId&&localImageById[imageId])||"";
          days[di].push({...migrated,image:migrated.image||localImg||"",imageId:imageId||""});
          if(imageId&&isValidImageValue(knownRemote))cloudKnownImageRegistry[imageId]=knownRemote;
        });
      }
      remoteAllData[wk][meal]=days;
    }
  }

  const remotePool=Array.isArray(data?.pool)?data.pool:[];
  const mergedPool=remotePool.map((item,i)=>{
    const migrated=migrateItem(item);
    const imageId=ensureItemImageId(migrated);
    const knownRemote=(imageId&&incomingImageRegistry[imageId])||"";
    return {...migrated,image:migrated?.image||knownRemote||pool[i]?.image||"",imageId:imageId||""};
  });
  const remotePresets=Array.isArray(data?.dayPresets)?data.dayPresets:[];
  allData=remoteAllData;
  pool=mergedPool;
  dayPresets=remotePresets.length?remotePresets:dayPresets;
  normalizeCurrentState(activeBoardId?null:(data&&data.settings)||null);
  rebuildImageRegistry({...cloudKnownImageRegistry,...imageRegistry});
  saveLocalOnly();
  render();
}
async function pushCurrentStateToCloud(){
  if(!cloudDocRef)return;
  const safe=await sanitizeForCloud();
  cloudLastClientWriteAt=Date.now();
  const setPayload={
    allData:safe.allData,
    pool:safe.pool,
    dayPresets:safe.dayPresets||[],
    imageRegistry:safe.imageRegistry,
    clientUpdatedAt:cloudLastClientWriteAt,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  if(!activeBoardId)setPayload.settings=safe.settings;
  await cloudDocRef.set(setPayload,{merge:true});
}
function scheduleCloudSave(){
  if(!cloudReady||!cloudDocRef||cloudApplyingRemote)return;
  if(cloudSaveTimer)clearTimeout(cloudSaveTimer);
  cloudSaveTimer=setTimeout(async()=>{
    try{
      await pushCurrentStateToCloud();
      clearCloudErrorState();
    }catch(e){
      console.warn(e);
      handleCloudError(e,"save");
    }
  },350);
}
async function startCloudSync(user,keepRetryState=false){
  const db=getCloudDb();
  if(!db){
    showToast("Firestore が利用できません。Firebase Console で Firestore Database を有効化してください");
    return false;
  }
  if(!keepRetryState){
    cloudRetryCount=0;
    cloudErrorState=null;
  }
  stopCloudSync(keepRetryState);
  cloudCurrentUser=user;
  if(activeBoardId){
    cloudDocRef=db.collection("sharedBoards").doc(activeBoardId);
  }else{
    cloudDocRef=db.collection("users").doc(user.uid).collection("app").doc("board");
  }

  try{
    const snap=await cloudDocRef.get();
    if(snap.exists){
      cloudApplyingRemote=true;
      applyRemoteState(snap.data()||{});
      cloudApplyingRemote=false;
    }else{
      await pushCurrentStateToCloud();
    }
    clearCloudErrorState();
  }catch(e){
    console.warn(e);
    handleCloudError(e,"init");
    return false;
  }

  cloudUnsub=cloudDocRef.onSnapshot(snap=>{
    cloudReady=true;
    if(!snap.exists)return;
    if(snap.metadata.hasPendingWrites)return;
    const data=snap.data()||{};
    const remoteUpdatedAt=Number(data.clientUpdatedAt)||0;
    if(remoteUpdatedAt&&remoteUpdatedAt===cloudLastClientWriteAt)return;
    const isFirst=!cloudHasInitialSnapshot;
    cloudHasInitialSnapshot=true;
    cloudApplyingRemote=true;
    applyRemoteState(data);
    cloudApplyingRemote=false;
    clearCloudErrorState();
    if(!isFirst)showToast("他端末の変更を同期しました");
  },e=>{
    console.warn(e);
    cloudReady=false;
    handleCloudError(e,"watch");
  });

  cloudReady=true;
  return true;
}

function clampSheetLevel(v){
  const n=parseInt(v,10);
  if(!Number.isFinite(n))return 4;
  return Math.min(10,Math.max(0,n));
}
function levelToSheetHeight(level){
  const lv=clampSheetLevel(level);
  const snapC=80;
  if(lv===0)return snapC;
  const minRatio=0.42,maxRatio=0.68;
  const minCap=340,maxCap=580;
  const ratio=minRatio+((maxRatio-minRatio)*lv/10);
  const cap=Math.round(minCap+((maxCap-minCap)*lv/10));
  return Math.min(Math.round(window.innerHeight*ratio),cap);
}
function getHalfSheetCapHeight(){
  return Math.max(220,Math.round(window.innerHeight*0.5));
}
function getSheetSnapPoints(){
  const level=clampSheetLevel(settings.sheetLevel);
  const snapLevels=Array.from({length:11},(_,lv)=>levelToSheetHeight(lv));
  const snapC=snapLevels[0];
  const snapE=snapLevels[level];
  const snapF=snapLevels[Math.min(level+2,10)];
  return{level,snapC,snapE,snapF,snapLevels};
}
function calcDayMinHeight(itemCount){
  const base=isTouchLikeDevice()?300:250;
  const perCard=84;
  const count=Math.max(0,Number(itemCount)||0);
  const dynamic=base+(count*perCard);
  const cap=Math.max(460,Math.round(window.innerHeight*1.25));
  return Math.min(dynamic,cap);
}

    col.addEventListener("dragleave",()=>col.classList.remove("drag-over-move","drag-over-copy"));

    hdr.appendChild(presetBtn);
    const dotsEl=document.createElement("div");dotsEl.className="meal-dots";

    MEALS.forEach(m=>{

    hdr.appendChild(dotsEl);
    if(wd[i].length>0){
      const clearBtn=document.createElement("button");
      clearBtn.type="button";
      clearBtn.className="day-clear-btn day-preset-btn";
      clearBtn.style.cssText="left:auto;right:24px;color:#ef4444;font-size:10px;";
      clearBtn.title="この日をクリア";
      clearBtn.innerText="✕";
      const di2=i;
      clearBtn.onclick=e=>{e.stopPropagation();pushUndo();weekData()[di2]=[];save();render();showToastWithUndo(`${DAYS[d.getDay()]}曜日の予定をクリアしました`);};
      hdr.appendChild(clearBtn);
    }
    col.appendChild(hdr);
    if(settings.dailyCalorieGoal>0){
      const dayCal=allMealData(k)[i].reduce((s,it)=>s+(it.calories||0),0);
      const ratio=dayCal/settings.dailyCalorieGoal;
      const pct=Math.min(ratio*100,100);
      const color=ratio>1?"#ef4444":ratio>0.8?"#f59e0b":"#22c55e";
      const barWrap=document.createElement("div");barWrap.className="cal-progress-bar-wrap";
      const bar=document.createElement("div");bar.className="cal-progress-bar";
      bar.style.cssText=`width:${pct}%;background:${color};`;
      barWrap.title=`${dayCal}kcal / 目標${settings.dailyCalorieGoal}kcal (${Math.round(ratio*100)}%)`;
      barWrap.appendChild(bar);
      col.appendChild(barWrap);
    }
    if(isAllMeals){
      const mealLabels={"朝":"🌅 朝","昼":"☀️ 昼","夜":"🌙 夜"};
      MEALS.forEach(meal=>{
        const sec=document.createElement("div");sec.className="meal-section";

        sec.appendChild(lbl);

        mealItems.forEach((item,ii)=>sec.appendChild(mkCardEl(item,{wk:k,di:i,ii,meal})));

      const dayKey=`${k}-${currentMeal}-${i}`;
      const limit=cardLimitByDensity();
      const items=expandedDayKeys[dayKey]?wd[i]:wd[i].slice(0,limit);
      items.forEach((item,ii)=>col.appendChild(mkCardEl(item,{wk:k,di:i,ii:wd[i].indexOf(item),meal:currentMeal})));

    }
    cal.appendChild(col);
  }

  // Pool
  renderPool();

function mkCardEl(item,target){
  const c=document.createElement("div");c.className="card";
  c.style.borderLeftColor=cardBorderColor(item);
  const isDraggable=canUseDragDrop()&&assignmentDayIndex==null;
  c.draggable=false;
  c.classList.toggle("is-draggable",isDraggable);
  const resolvedImage=resolveItemImage(item);
  const hasImage=settings.showPlannedCardImage&&resolvedImage;
  if(hasImage)c.classList.add("has-image");

  const main=document.createElement("div");main.className="card-main";

  const textEl=document.createElement("div");textEl.className="card-text";textEl.innerText=item.text;main.appendChild(textEl);

  const meta=document.createElement("div");meta.className="card-meta";
  if(showCardField("calories")&&settings.showCalories&&item.calories>0){
    const b=document.createElement("span");b.className="card-badge";
    b.style.background=item.calories>600?"#ef444422":item.calories>400?"#f59e0b22":"#22c55e22";
    b.style.color=item.calories>600?"#f87171":item.calories>400?"#fbbf24":"#4ade80";
    if(hasImage){
      b.style.background="rgba(15,23,42,.78)";
      b.style.border="1px solid #334155";
    }
    b.innerText="🔥 "+item.calories+"kcal";meta.appendChild(b);
  }
  if(showCardField("cost")&&settings.showCost&&item.cost>0){
    const b=document.createElement("span");b.className="card-badge";b.style.color="#94a3b8";
    b.innerText="💰"+item.cost+settings.currency;meta.appendChild(b);
  }
  if(showCardField("favorite")&&item.favorite>0){
    const b=document.createElement("span");b.className="card-stars";b.innerText=starsHTML(item.favorite,5);meta.appendChild(b);
  }
  if(showCardField("difficulty")&&item.difficulty>0){
    const b=document.createElement("span");b.className="card-badge";b.style.color="#64748b";
    b.innerText="難"+starsHTML(item.difficulty,5);meta.appendChild(b);
  }
  const invCt=inventoryCount(item);
  if(showCardField("inventory")&&invCt.total>0){
    const tone=inventoryBadgeTone(invCt.stocked,invCt.total);
    const b=document.createElement("span");b.className="card-badge";b.style.color="#cbd5e1";
    b.style.background=tone.bg;b.style.color=tone.fg;
    b.innerText="📦 在庫 "+invCt.stocked+"/"+invCt.total;meta.appendChild(b);
  }
  if((item.cookTime||0)>0){
    const b=document.createElement("span");b.className="card-badge";
    b.style.color=(item.cookTime<=15)?"#4ade80":(item.cookTime<=30)?"#fbbf24":"#94a3b8";
    b.innerText="⏱ "+item.cookTime+"分";meta.appendChild(b);
  }
  const noteUrl=extractUrl(item.note);
  if(noteUrl){
    const a=document.createElement("a");a.className="card-badge";a.href=noteUrl;a.target="_blank";a.rel="noopener noreferrer";
    a.style.color="#60a5fa";a.innerText="🔗 レシピ";a.onclick=e=>e.stopPropagation();meta.appendChild(a);
  }

  const tag=item.tag||"その他";
  const makeTagEl=()=>{
    const tg=document.createElement("span");tg.className="card-tag";tg.innerText=tag;
    tg.style.background=hasImage?"rgba(15,23,42,.78)":(TC[tag]||"#6b7280")+"22";
    tg.style.color=TC[tag]||"#6b7280";
    if(hasImage)tg.style.border="1px solid #334155";
    return tg;
  };

  if(!hasImage){
    if(meta.children.length)main.appendChild(meta);
    if(showCardField("tag"))main.appendChild(makeTagEl());
    c.appendChild(main);
  }

  const eb=document.createElement("button");eb.className="card-edit-btn";eb.innerText="✏️";
  eb.onclick=e=>{e.stopPropagation();openEdit(target);};c.appendChild(eb);

  if(hasImage){
    const imgWrap=document.createElement("div");imgWrap.className="card-img-wrap";
    const img=document.createElement("img");img.className="card-img";img.src=resolvedImage;img.alt="";img.draggable=false;imgWrap.appendChild(img);
    c.appendChild(imgWrap);
    if(meta.children.length)main.appendChild(meta);
    if(showCardField("tag"))main.appendChild(makeTagEl());
    c.appendChild(main);
  }

  if(isDraggable){
    textEl.draggable=true;
    textEl.addEventListener("dragstart",e=>{
      e.dataTransfer.setData("text",JSON.stringify(target));
      e.dataTransfer.setDragImage(c,0,0);
    });
  }
  bindLongPressTouchDrag(textEl,()=>({...target}));

  if(target.wk&&target.meal!==undefined){
    let startX=0,startY=0,swiping=false,hLocked=false,pointerId=null;
    const maxSwipe=120,deleteThreshold=90;

    const mixBg=dx=>{
      const p=Math.min(1,Math.abs(dx)/deleteThreshold);
      const r=Math.round(30+(239-30)*p);
      const g=Math.round(41+(68-41)*p);
      const b=Math.round(59+(68-59)*p);
      c.style.backgroundColor=`rgb(${r},${g},${b})`;
    };
    const reset=()=>{
      c.style.transform="translateX(0)";
      c.style.backgroundColor="";
      c.style.opacity="1";
    };

    c.addEventListener("pointerdown",e=>{
      if(e.pointerType==="mouse")return;
      if(e.target.closest(".card-edit-btn"))return;
      startX=e.clientX;startY=e.clientY;
      swiping=true;hLocked=false;pointerId=e.pointerId;
      c.setPointerCapture?.(pointerId);
    });

    c.addEventListener("pointermove",e=>{
      if(touchDragState&&touchDragState.sourceEl===c)return;
      if(!swiping||e.pointerId!==pointerId)return;
      const dx=e.clientX-startX;
      const dy=e.clientY-startY;

      if(!hLocked){
        if(Math.abs(dx)<=8&&Math.abs(dy)<=8)return;
        if(Math.abs(dx)<=Math.abs(dy)){swiping=false;reset();return;}
        hLocked=true;
      }

      if(dx>=0){reset();return;}
      const clamped=Math.max(-maxSwipe,dx);
      e.preventDefault();
      c.style.transform=`translateX(${clamped}px)`;
      mixBg(clamped);
    });

    const finish=e=>{
      if(touchDragState&&touchDragState.sourceEl===c)return;
      if(!swiping||e.pointerId!==pointerId)return;
      const dx=e.clientX-startX;
      swiping=false;
      c.releasePointerCapture?.(pointerId);

      if(dx<=-deleteThreshold){
        c.style.transform="translateX(-120%)";
        c.style.opacity="0";
        setTimeout(()=>removePlannedCard(target),140);
      }else{
        reset();
      }
    };

    c.addEventListener("pointerup",finish);
    c.addEventListener("pointercancel",finish);
  }

  return c;
}

// ===== STAR RATING =====
function buildStarRating(cid,val,max){
  const c=document.getElementById(cid);
  if(c._ml){c.removeEventListener("mouseleave",c._ml);}
  c.innerHTML="";c.dataset.val=val;
  for(let i=1;i<=max;i++){
    const s=document.createElement("span");
    s.innerText=i<=val?"★":"☆";if(i<=val)s.classList.add("on");
    s.addEventListener("click",()=>{
      const cur=parseInt(c.dataset.val);
      buildStarRating(cid,cur===i?0:i,max);
    });
    s.addEventListener("mouseenter",()=>[...c.children].forEach((x,j)=>x.style.color=j<i?"#fbbf24":""));
    c.appendChild(s);
  }
  c._ml=()=>{
    const v=parseInt(c.dataset.val);
    [...c.children].forEach((x,j)=>x.style.color=j<v?"#f59e0b":"");
  };
  c.addEventListener("mouseleave",c._ml);
}

// ===== IMAGE HANDLING =====
function handleImageUpload(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height,mx=320;
      if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      currentImage=canvas.toDataURL("image/jpeg",0.7);
      currentImageId=resolveOrCreateImageId(currentImage,"");
      const pv=document.getElementById("eImagePreview");
      pv.src=currentImage;pv.style.display="block";
      document.getElementById("eImageClear").style.display="inline-block";
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);ev.target.value="";
}
function clearImage(){
  currentImage="";
  currentImageId="";
  const pv=document.getElementById("eImagePreview");pv.src="";pv.style.display="none";
  document.getElementById("eImageClear").style.display="none";
}

  document.getElementById("eText").value=item?.text||"";
  document.getElementById("eNote").value=item?.note||"";
  document.getElementById("eSteps").value=item?.steps||"";
  document.getElementById("eCalories").value=item?.calories||"";
  document.getElementById("eProtein").value=item?.protein||"";
  document.getElementById("eCarbs").value=item?.carbs||"";
  document.getElementById("eFat").value=item?.fat||"";
  document.getElementById("eFiber").value=item?.fiber||"";
  document.getElementById("eSugar").value=item?.sugar||"";
  document.getElementById("eSalt").value=item?.salt||"";
  document.getElementById("eVitamins").value=item?.vitamins||"";
  document.getElementById("eCost").value=item?.cost||"";
  document.getElementById("eCookTime").value=item?.cookTime||"";

  const list=document.getElementById("eIngList");list.innerHTML="";
  (item?.ingredients||[]).forEach(v=>addIngRow(v,(item?.ingredientInventory||{})[v]===true));
  currentImageId=item?.imageId||"";
  currentImage=resolveItemImage(item)||"";
  if(currentImage&&!currentImageId)currentImageId=resolveOrCreateImageId(currentImage,"");
  const pv=document.getElementById("eImagePreview");
  if(currentImage){pv.src=currentImage;pv.style.display="block";document.getElementById("eImageClear").style.display="inline-block";}
  else{pv.src="";pv.style.display="none";document.getElementById("eImageClear").style.display="none";}
  const deleteBtn=document.getElementById("editDeleteBtn");
  if(deleteBtn){
    const isExisting=(target.type==="pool"&&target.pidx>=0)||!!target.wk;
    deleteBtn.style.display=isExisting?"inline-flex":"none";
  }
  selectEditTab("basic");
  document.getElementById("editOverlay").classList.add("open");
  setTimeout(()=>document.getElementById("eText").focus(),50);

function deleteFromEdit(){
  if(!editTarget)return;
  pushUndo();
  if(editTarget.type==="pool"&&editTarget.pidx>=0){
    pool.splice(editTarget.pidx,1);
    closeOverlay("editOverlay");save();renderPool();showToastWithUndo("削除しました");
  }else if(editTarget.wk){
    const day=allData[editTarget.wk]?.[editTarget.meal]?.[editTarget.di];
    if(day&&editTarget.ii>=0&&editTarget.ii<day.length)day.splice(editTarget.ii,1);
    closeOverlay("editOverlay");save();render();showToastWithUndo("予定を削除しました");
  }
}

function saveEdit(){
  const text=document.getElementById("eText").value.trim();
  if(!text){document.getElementById("eText").focus();return;}
  const sel=document.querySelector("#ePicker .tag-btn.selected");
  const tag=sel?sel.innerText:"その他";
  const note=document.getElementById("eNote").value.trim();
  const steps=document.getElementById("eSteps").value.trim();
  const calories=parseInt(document.getElementById("eCalories").value)||0;
  const protein=parseFloat(document.getElementById("eProtein").value)||0;
  const carbs=parseFloat(document.getElementById("eCarbs").value)||0;
  const fat=parseFloat(document.getElementById("eFat").value)||0;
  const fiber=parseFloat(document.getElementById("eFiber").value)||0;
  const sugar=parseFloat(document.getElementById("eSugar").value)||0;
  const salt=parseFloat(document.getElementById("eSalt").value)||0;
  const vitamins=document.getElementById("eVitamins").value.trim();
  const cost=parseInt(document.getElementById("eCost").value)||0;
  const cookTime=parseInt(document.getElementById("eCookTime").value)||0;
  const favorite=parseInt(document.getElementById("eFavorite").dataset.val)||0;
  const difficulty=parseInt(document.getElementById("eDifficulty").dataset.val)||0;
  const ings=[];
  const ingredientInventory={};
  [...document.querySelectorAll("#eIngList .ing-row")].forEach(row=>{
    const input=row.querySelector("input.form-input");
    const stock=row.querySelector(".ing-stock-check");
    const v=(input?.value||"").trim();
    if(!v)return;
    ings.push(v);
    ingredientInventory[v]=!!stock?.checked;
  });
  const isPoolTarget=editTarget.type==="pool";
  let nextImageId=(currentImageId||"").trim();
  if(currentImage){
    nextImageId=resolveOrCreateImageId(currentImage,nextImageId);
    imageRegistry[nextImageId]=currentImage;
  }else{
    nextImageId="";
  }
  pushUndo();
  const fields={text,tag,note,steps,calories,protein,carbs,fat,fiber,sugar,salt,vitamins,cost,cookTime,favorite,difficulty,ingredients:ings,ingredientInventory,image:isPoolTarget?currentImage:"",imageId:nextImageId};
  if(editTarget.directDayIndex!=null){
    const newItem={...mkItem(text,tag,ings,note),...fields};
    pool.push(newItem);
    const targetWk=editTarget.directWk||curKey();
    const targetMeal=editTarget.directMeal||currentMeal;
    if(!allData[targetWk])allData[targetWk]={};
    MEALS.forEach(m=>{if(!allData[targetWk][m])allData[targetWk][m]=Array.from({length:7},()=>[]);});
    allData[targetWk][targetMeal][editTarget.directDayIndex].push(createPlannedItemFromSource(newItem,true));
  }else if(editTarget.type==="pool"&&editTarget.pidx<0){
    pool.push({...mkItem(text,tag,ings,note),...fields});
  }else if(editTarget.type==="pool"){
    Object.assign(pool[editTarget.pidx],fields);
  }else{
    Object.assign(allData[editTarget.wk][editTarget.meal][editTarget.di][editTarget.ii],fields);
  }
  save();closeOverlay("editOverlay");render();
}

  if(activeTagFilter)chips.push([`カテゴリ:${activeTagFilter}`,()=>{activeTagFilter=null;}]);
  if(activeCostFilter)chips.push([`金額:${activeCostFilter.min??"0"}〜${activeCostFilter.max??"∞"}${settings.currency}`,()=>{activeCostFilter=null;}]);
  if(activeFavoriteFilter!=null)chips.push([`お気に入り:${activeFavoriteFilter}★以上`,()=>{activeFavoriteFilter=null;}]);
  if(activeDifficultyFilter!=null)chips.push([`簡単度:${activeDifficultyFilter}★以上`,()=>{activeDifficultyFilter=null;}]);
  if(activeCalorieFilter)chips.push([`カロリー:${activeCalorieFilter.min??"0"}〜${activeCalorieFilter.max??"∞"}kcal`,()=>{activeCalorieFilter=null;}]);
  if(activeInventoryFilter===true)chips.push(["在庫あり",()=>{activeInventoryFilter=null;}]);
  if(activeInventoryFilter===false)chips.push(["在庫不足",()=>{activeInventoryFilter=null;}]);
  const MAX_VISIBLE_CHIPS=4;
  chips.slice(0,MAX_VISIBLE_CHIPS).forEach(([label,reset])=>{
    const chip=document.createElement("span");chip.className="filter-chip";
    chip.innerText=label;
    const x=document.createElement("button");x.innerText="×";
    x.onclick=()=>{reset();renderPool();renderFilterPanel();};
    chip.appendChild(x);bar.appendChild(chip);
  });
  if(chips.length>MAX_VISIBLE_CHIPS){
    const more=document.createElement("span");
    more.className="filter-chip more";
    more.innerText=`+${chips.length-MAX_VISIBLE_CHIPS}件`;
    bar.appendChild(more);
  }
  bar.classList.toggle("show",chips.length>0);
}

// ===== GRAPH =====
function showGraph(){
  const k=curKey();
  const start=new Date(baseDate);start.setDate(start.getDate()-start.getDay());
  const combined=allMealData(k);
  const dayStats=combined.map((day,i)=>{
    const d=new Date(start);d.setDate(start.getDate()+i);
    return{
      label:DAYS[d.getDay()],
      calories:day.reduce((s,it)=>s+(it.calories||0),0),
      protein:day.reduce((s,it)=>s+(it.protein||0),0),
      carbs:day.reduce((s,it)=>s+(it.carbs||0),0),
      fat:day.reduce((s,it)=>s+(it.fat||0),0),
      cost:day.reduce((s,it)=>s+(it.cost||0),0),
    };
  });
  const maxCal=Math.max(...dayStats.map(d=>d.calories),1);
  const totalCal=dayStats.reduce((s,d)=>s+d.calories,0);
  const totalProt=dayStats.reduce((s,d)=>s+d.protein,0);
  const totalCarbs=dayStats.reduce((s,d)=>s+d.carbs,0);
  const totalFat=dayStats.reduce((s,d)=>s+d.fat,0);
  const totalCost=dayStats.reduce((s,d)=>s+d.cost,0);
  const maxMacro=Math.max(totalProt,totalCarbs,totalFat,1);

  const g=document.getElementById("graphContent");g.innerHTML="";

  if(totalCal===0){
    const hint=document.createElement("p");hint.className="msec-hint";

  // Summary boxes

  [
    ["🔥 週計カロリー",totalCal+"kcal","#f59e0b"],
    ["💰 週計費用",totalCost+settings.currency,"#22c55e"],
    ["🥩 タンパク質",totalProt+"g","#f97316"],
    ["🍚 炭水化物",totalCarbs+"g","#3b82f6"],

    const box=document.createElement("div");box.className="graph-box";
    box.style.borderLeft="3px solid "+color;
    box.innerHTML="<div style=\"font-size:10px;color:#64748b;\">"+label+"</div><div style=\"font-size:15px;font-weight:bold;color:"+color+";margin-top:3px;\">"+val+"</div>";
    sumDiv.appendChild(box);
  });
  g.appendChild(sumDiv);

  // Calorie bar chart
  const t1=document.createElement("div");t1.style.cssText="font-size:11px;color:#64748b;margin-bottom:6px;";t1.innerText="📊 日別カロリー";g.appendChild(t1);
  const bars=document.createElement("div");bars.className="graph-bars";
  dayStats.forEach(stat=>{
    const wrap=document.createElement("div");wrap.className="graph-bar-wrap";
    const bar=document.createElement("div");bar.className="graph-bar";
    const pct=stat.calories>0?Math.max(4,Math.round(stat.calories/maxCal*100)):0;
    bar.style.height=pct+"%";
    if(stat.calories>600)bar.classList.add("high");else if(stat.calories>400)bar.classList.add("mid");
    const val=document.createElement("div");val.className="graph-bar-val";val.innerText=stat.calories||"";
    const lbl=document.createElement("div");lbl.className="graph-bar-label";lbl.innerText=stat.label;
    wrap.appendChild(bar);wrap.appendChild(val);wrap.appendChild(lbl);bars.appendChild(wrap);

  g.appendChild(bars);

  // Macro bars
  if(totalProt||totalCarbs||totalFat){
    const t2=document.createElement("div");t2.style.cssText="font-size:11px;color:#64748b;margin:12px 0 8px;";t2.innerText="🥗 週計マクロ栄養素";g.appendChild(t2);

// ===== AUTO SUGGEST =====
function autoSuggest(){
  if(!pool.length){showToast("プールに献立がありません");return;}
  pushUndo();const wd=weekData();let filled=0;
  const scored=[...pool].sort((a,b)=>inventoryScore(b)-inventoryScore(a));
  const topN=Math.max(1,Math.min(scored.length,Math.ceil(scored.length*0.35)));
  wd.forEach(day=>{
    if(!day.length){
      const candidates=scored.slice(0,topN);
      const pick=(candidates.length?candidates:pool)[Math.floor(Math.random()*(candidates.length||pool.length))];
      day.push(createPlannedItemFromSource(pick,true));filled++;
    }
  });
  if(!filled){showToast("全日に献立が入っています");undoStack.pop();return;}
  save();render();showToast(filled+"日分を提案しました 🎲");
}

// ===== POOL RENDER =====
function renderPool(){
  const pDiv=document.getElementById("pool");if(!pDiv)return;
  pDiv.innerHTML="";
  renderActiveFilterBar();
  const term=(document.getElementById("poolSearch")?.value||"").toLowerCase();
  const matchCost=item=>{
    if(!activeCostFilter)return true;
    const cost=Number(item.cost)||0;
    if(cost<=0)return false;
    if(activeCostFilter.min!=null&&cost<activeCostFilter.min)return false;
    if(activeCostFilter.max!=null&&cost>activeCostFilter.max)return false;
    return true;
  };
  const matchFavorite=item=>{
    if(activeFavoriteFilter==null)return true;
    const favorite=Number(item.favorite)||0;
    return favorite>=activeFavoriteFilter;
  };
  const matchDifficulty=item=>{
    if(activeDifficultyFilter==null)return true;
    const difficulty=Number(item.difficulty)||0;
    return difficulty>=activeDifficultyFilter;
  };
  const matchCalorie=item=>{
    if(!activeCalorieFilter)return true;
    const calories=Number(item.calories)||0;
    if(calories<=0)return false;
    if(activeCalorieFilter.min!=null&&calories<activeCalorieFilter.min)return false;
    if(activeCalorieFilter.max!=null&&calories>activeCalorieFilter.max)return false;
    return true;
  };
  const matchInventory=item=>{
    const ings=item.ingredients||[];
    if(activeInventoryFilter===null)return true;
    if(!ings.length)return false;
    const inv=item.ingredientInventory||{};
    if(activeInventoryFilter===true)return ings.every(ing=>inv[ing]===true);
    return ings.some(ing=>inv[ing]!==true);
  };
  const filtered=pool.filter(item=>{
    if(activeTagFilter&&item.tag!==activeTagFilter)return false;
    if(!matchCost(item))return false;
    if(!matchFavorite(item))return false;
    if(!matchDifficulty(item))return false;
    if(!matchCalorie(item))return false;
    if(!matchInventory(item))return false;
    if(weekdayMode&&(item.cookTime||0)>30)return false;
    if(term&&!item.text.toLowerCase().includes(term))return false;
    return true;
  });
  if(!filtered.length){
    const em=document.createElement("div");em.className="pool-empty";
    const hasFilter=!!(term||activeTagFilter||activeCostFilter||activeFavoriteFilter!=null||activeDifficultyFilter!=null||activeCalorieFilter||activeInventoryFilter!==null);
    em.innerText=hasFilter?"条件が厳しめです。条件を1つ外してみてください":"献立プールが空です";
    pDiv.appendChild(em);
    if(assignmentDayIndex!=null){
      const hint=document.createElement("div");
      hint.className="pool-assign-hint";
      const msg=document.createElement("span");
      msg.innerText=`割り当て先: ${assignmentDateLabel(assignmentDayIndex)}（候補がありません）`;
      const cancel=document.createElement("button");
      cancel.className="btn";
      cancel.type="button";
      cancel.innerText="終了";
      cancel.onclick=()=>{exitAssignmentMode();showToast("割り当てモードを終了しました");};
      hint.appendChild(msg);
      hint.appendChild(cancel);
      pDiv.prepend(hint);
    }
    return;
  }
  filtered.forEach(item=>{
    const pidx=pool.indexOf(item);
    const resolvedImage=resolveItemImage(item);
    const hasImage=!!(resolvedImage&&settings.showPlannedCardImage);
    const c=document.createElement("div");
    c.className="pool-card"+(hasImage?" has-image":"");
    c.style.borderLeftColor=cardBorderColor(item);
    const isDraggable=canUseDragDrop()&&assignmentDayIndex==null;
    c.draggable=false;
    c.classList.toggle("is-draggable",isDraggable);

    const main=document.createElement("div");main.className="card-main";
    const span=document.createElement("div");span.className="card-text";span.innerText=item.text;main.appendChild(span);
    if(settings.showStars&&item.favorite>0){
      const s=document.createElement("span");s.style.cssText="font-size:9px;color:#f59e0b;display:block;margin-top:2px;";
      s.innerText=starsHTML(item.favorite,5);main.appendChild(s);
    }
    if(settings.showCalories&&item.calories>0){
      const b=document.createElement("span");b.className="card-badge";
      b.style.background=item.calories>600?"#ef444422":item.calories>400?"#f59e0b22":"#22c55e22";
      b.style.color=item.calories>600?"#f87171":item.calories>400?"#fbbf24":"#4ade80";
      b.style.display="inline-block";b.style.marginTop="2px";
      b.innerText="🔥 "+item.calories+"kcal";main.appendChild(b);
    }
    if(settings.showCost&&item.cost>0){
      const b=document.createElement("span");b.className="card-badge";
      b.style.cssText="display:inline-block;margin-top:2px;color:#94a3b8;";
      b.innerText="💰"+item.cost+settings.currency;main.appendChild(b);
    }
    if(settings.showDifficulty&&item.difficulty>0){
      const b=document.createElement("span");b.className="card-badge";
      b.style.cssText="display:inline-block;margin-top:2px;color:#64748b;";
      b.innerText="難"+starsHTML(item.difficulty,5);main.appendChild(b);
    }
    const invCt=inventoryCount(item);
    if(invCt.total>0){
      const tone=inventoryBadgeTone(invCt.stocked,invCt.total);
      const ib=document.createElement("span");ib.className="card-badge";
      ib.style.cssText=`display:inline-block;margin-top:2px;color:${tone.fg};background:${tone.bg};`;
      ib.innerText="📦 在庫 "+invCt.stocked+"/"+invCt.total;main.appendChild(ib);
    }
    if((item.cookTime||0)>0){
      const cb=document.createElement("span");cb.className="card-badge";
      cb.style.cssText="display:inline-block;margin-top:2px;";
      cb.style.color=(item.cookTime<=15)?"#4ade80":(item.cookTime<=30)?"#fbbf24":"#94a3b8";
      cb.innerText="⏱ "+item.cookTime+"分";main.appendChild(cb);

// ===== BOTTOM SHEET =====
function initBottomSheet(){
  const sheet=document.getElementById("bottomSheet");
  const handle=document.getElementById("sheetHandle");
  const search=document.getElementById("poolSearch");
  const restoreBtn=document.getElementById("sheetRestoreBtn");
  if(!sheet||!handle||!search)return;
  let drag=false,startY=0,startH=0;
  let lastTapAt=0,lastTapX=0,lastTapY=0;
  function clampSheetHeight(h){
    const{snapLevels}=getSheetSnapPoints();
    return Math.max(snapLevels[0],Math.min(snapLevels[10],Math.round(h)));
  }
  function snapTo(h,persist){
    ensureSheetVisible(false);
    const next=clampSheetHeight(h);
    sheet.classList.add("bs-anim");
    sheet.style.height=next+"px";
    if(persist){
      settings.sheetHeight=next;
      save();
    }
    setTimeout(()=>sheet.classList.remove("bs-anim"),340);
  }
  function startDrag(clientY){
    if(settings.sheetHidden){settings.sheetHidden=false;updateSheetRestoreButton();}
    drag=true;startY=clientY;startH=sheet.offsetHeight;
    sheet.classList.remove("bs-anim");
  }
  function moveDrag(clientY){
    if(!drag)return;
    sheet.style.height=clampSheetHeight(startH+(startY-clientY))+"px";
  }
  function endDrag(){
    if(!drag)return;drag=false;
    const finalHeight=clampSheetHeight(sheet.offsetHeight);
    const{snapLevels}=getSheetSnapPoints();
    const closeHeight=snapLevels[0];
    const closeThreshold=closeHeight+48;
    const settledHeight=finalHeight<=closeThreshold?closeHeight:finalHeight;
    sheet.style.height=settledHeight+"px";
    settings.sheetHeight=settledHeight;
    settings.sheetHidden=false;
    save();
  }
  function toggleHiddenByDoubleTap(clientX,clientY){
    const now=Date.now();
    const isDouble=(now-lastTapAt)<=320&&Math.abs(clientX-lastTapX)<=24&&Math.abs(clientY-lastTapY)<=24;
    lastTapAt=now;
    lastTapX=clientX;
    lastTapY=clientY;
    if(!isDouble)return false;
    setSheetHidden(!settings.sheetHidden);
    return true;
  }

  if("PointerEvent" in window){
    const onPointerMove=e=>moveDrag(e.clientY);
    const onPointerEnd=()=>{
      endDrag();
      window.removeEventListener("pointermove",onPointerMove);
      window.removeEventListener("pointerup",onPointerEnd);
      window.removeEventListener("pointercancel",onPointerEnd);
    };
    handle.addEventListener("pointerdown",e=>{
      if(e.target.closest("input,button"))return;
      if(toggleHiddenByDoubleTap(e.clientX,e.clientY)){e.preventDefault();return;}
      startDrag(e.clientY);
      window.addEventListener("pointermove",onPointerMove);
      window.addEventListener("pointerup",onPointerEnd);
      window.addEventListener("pointercancel",onPointerEnd);
      e.preventDefault();
    });
  }else{
    const onMouseMove=e=>moveDrag(e.clientY);
    const onMouseUp=()=>{
      endDrag();
      window.removeEventListener("mousemove",onMouseMove);
      window.removeEventListener("mouseup",onMouseUp);
    };
    handle.addEventListener("mousedown",e=>{
      if(e.target.closest("input,button"))return;
      if(toggleHiddenByDoubleTap(e.clientX,e.clientY)){e.preventDefault();return;}
      startDrag(e.clientY);
      window.addEventListener("mousemove",onMouseMove);
      window.addEventListener("mouseup",onMouseUp);
      e.preventDefault();
    });

    const onTouchMove=e=>{
      if(!e.touches.length)return;
      moveDrag(e.touches[0].clientY);
      e.preventDefault();
    };
    const onTouchEnd=()=>{
      endDrag();
      window.removeEventListener("touchmove",onTouchMove);
      window.removeEventListener("touchend",onTouchEnd);
      window.removeEventListener("touchcancel",onTouchEnd);
    };
    handle.addEventListener("touchstart",e=>{
      if(e.target.closest("input,button")||!e.touches.length)return;
      const t=e.touches[0];
      if(toggleHiddenByDoubleTap(t.clientX,t.clientY)){e.preventDefault();return;}
      startDrag(e.touches[0].clientY);
      window.addEventListener("touchmove",onTouchMove,{passive:false});
      window.addEventListener("touchend",onTouchEnd);
      window.addEventListener("touchcancel",onTouchEnd);
      e.preventDefault();
    },{passive:false});
  }

  if(restoreBtn){
    restoreBtn.addEventListener("click",()=>{
      setSheetHidden(false);
    });
  }

  search.addEventListener("focus",()=>{
    ensureSheetVisible(false);
    const focusHeight=clampSheetHeight(sheet.offsetHeight+120);
    if(focusHeight>sheet.offsetHeight+2)snapTo(focusHeight,false);
  });
  search.addEventListener("input",renderPool);
  if(!localStorage.getItem("sheetHintSeen")){
    const hint=document.getElementById("sheetHintText");
    if(hint){hint.style.display="block";setTimeout(()=>{hint.style.transition="opacity 1s";hint.style.opacity="0";setTimeout(()=>hint.style.display="none",1000);},5000);}
    localStorage.setItem("sheetHintSeen","1");
  }
  const{snapLevels:initSnap}=getSheetSnapPoints();
  const savedH=Number.isFinite(Number(settings.sheetHeight))
    ?clampSheetHeight(Number(settings.sheetHeight))
    :initSnap[clampSheetLevel(settings.sheetLevel)];
  sheet.style.height=(settings.sheetHidden?28:savedH)+"px";
  updateSheetRestoreButton();
}
