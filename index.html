// ===== AUTH =====
let authBusy=false;
let authProvider=null;
let boardUnlocked=false;

function authErrJa(code,message){
  const map={
    "auth/invalid-email":"メールアドレスの形式が正しくありません。",
    "auth/user-not-found":"このメールアドレスのユーザーは見つかりません。",
    "auth/wrong-password":"パスワードが正しくありません。",
    "auth/invalid-credential":"メールアドレスまたはパスワードが正しくありません。",
    "auth/email-already-in-use":"このメールアドレスは既に使用されています。",
    "auth/weak-password":"パスワードは6文字以上で入力してください。",
    "auth/popup-closed-by-user":"ログインポップアップが閉じられました。",
    "auth/network-request-failed":"ネットワーク接続を確認してください。"
  };
  return map[code]||message||"ログインに失敗しました。時間をおいて再試行してください。";
}
function setAuthMessage(msg,type){
  const el=document.getElementById("authMessage");
  if(!el)return;
  el.innerText=msg||"";
  el.classList.toggle("success",type==="success");
}
function setAuthBusy(next){
  authBusy=!!next;
  document.body.classList.toggle("auth-busy",authBusy);
  ["googleLoginBtn","loginBtn","registerBtn","guestLoginBtn"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.disabled=authBusy;
  });
}
function unlockBoard(isGuest=false){
  if(boardUnlocked)return;
  boardUnlocked=true;
  document.body.classList.remove("auth-locked");
  const authScreen=document.getElementById("authScreen");
  if(authScreen)authScreen.classList.add("hidden");
  if(!isGuest)document.getElementById("guestBanner")?.classList.remove("show");
}
function currentAuthInput(){
  const email=(document.getElementById("authEmail")?.value||"").trim();
  const password=document.getElementById("authPassword")?.value||"";
  return {email,password};
}
function guardAuthInput(){
  const {email,password}=currentAuthInput();
  if(!email||!password){
    setAuthMessage("メールアドレスとパスワードを入力してください。","error");
    return null;
  }
  return {email,password};
}
function initAuth(){
  document.getElementById("guestLoginBtn")?.addEventListener("click",()=>{
    if(authBusy)return;
    setAuthMessage("ゲストログインで献立ボードを表示しました（ローカル保存のみ）。","success");
    showToast("ゲストログイン中はクラウド同期されません");
    document.getElementById("guestBanner")?.classList.add("show");
    unlockBoard();
  });

  if(typeof firebase==="undefined"){
    setAuthMessage("認証ライブラリの読み込みに失敗しました。再読み込みしてください。","error");
    return;
  }

  if(!firebase.apps.length){
    firebase.initializeApp({
      apiKey:"AIzaSyBnWWLB176zLN1_-w-FG9FqlwqVNW97IK0",
      authDomain:"mealplanner-169aa.firebaseapp.com",
      projectId:"mealplanner-169aa",
      storageBucket:"mealplanner-169aa.firebasestorage.app",
      messagingSenderId:"560723711434",
      appId:"1:560723711434:web:b63509eccb808abe1cab33",
      measurementId:"G-1KWZY2JPP3"
    });
  }

  const auth=firebase.auth();
  authProvider=new firebase.auth.GoogleAuthProvider();

  auth.onAuthStateChanged(async user=>{
    if(user){
      setAuthMessage("ログイン成功。クラウド同期を開始しています...","success");
      try{
        const syncReady=await startCloudSync(user);
        if(syncReady){
          setAuthMessage("ログイン成功。クラウド同期が有効です。","success");
        }else{
          setAuthMessage("ログイン成功。クラウド同期を開始できなかったため、この端末の保存のみで続行します。","error");
        }
      }catch(e){
        console.warn(e);
        showToast("クラウド同期を開始できませんでした");
        setAuthMessage("ログイン成功。クラウド同期を開始できなかったため、この端末の保存のみで続行します。","error");
      }
      setAuthBusy(false);
      unlockBoard();
      // URL パラメータから共有ボードへ自動参加
      try{
        const urlBoard=new URLSearchParams(location.search).get("board");
        if(urlBoard){
          const already=joinedBoards.find(b=>b.boardId===urlBoard);
          if(already){
            if(activeBoardId!==urlBoard)await switchToBoard(urlBoard,already.name);
          }else{
            await joinSharedBoard(urlBoard);
          }
        }
      }catch(e){console.warn(e);}
      updateBoardBadge();
      return;
    }
    stopCloudSync();
    boardUnlocked=false;
    setAuthBusy(false);
    document.body.classList.add("auth-locked");
    const authScreen=document.getElementById("authScreen");
    if(authScreen)authScreen.classList.remove("hidden");
    updateBoardBadge();
  });

  const loginWithGoogle=async()=>{
    if(authBusy)return;
    setAuthMessage("");
    setAuthBusy(true);
    try{
      await auth.signInWithPopup(authProvider);
    }catch(e){
      setAuthMessage(authErrJa(e.code,e.message),"error");
      setAuthBusy(false);
    }
  };

  const loginWithEmail=async()=>{
    if(authBusy)return;
    const v=guardAuthInput();
    if(!v)return;
    setAuthMessage("");
    setAuthBusy(true);
    try{
      await auth.signInWithEmailAndPassword(v.email,v.password);
    }catch(e){
      setAuthMessage(authErrJa(e.code,e.message),"error");
      setAuthBusy(false);
    }
  };

  const registerWithEmail=async()=>{
    if(authBusy)return;
    const v=guardAuthInput();
    if(!v)return;
    setAuthMessage("");
    setAuthBusy(true);
    try{
      await auth.createUserWithEmailAndPassword(v.email,v.password);
    }catch(e){
      setAuthMessage(authErrJa(e.code,e.message),"error");
      setAuthBusy(false);
    }
  };

  document.getElementById("googleLoginBtn")?.addEventListener("click",loginWithGoogle);
  document.getElementById("loginBtn")?.addEventListener("click",loginWithEmail);
  document.getElementById("registerBtn")?.addEventListener("click",registerWithEmail);

  document.getElementById("authPassword")?.addEventListener("keydown",e=>{
    if(e.key==="Enter")loginWithEmail();
  });
}
